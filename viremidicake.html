<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quest 3 Standalone MIDI Bridge</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #eee; padding: 20px; text-align: center; }
        .status { margin: 10px auto; padding: 10px; width: 80%; border-radius: 5px; font-weight: bold; }
        .connected { background: #1b4332; color: #75a47f; border: 1px solid #2d6a4f; }
        .disconnected { background: #4a1c1c; color: #e63946; border: 1px solid #660708; }
        #log { background: #000; color: #00ff66; font-family: monospace; text-align: left; padding: 10px; height: 180px; overflow-y: auto; font-size: 12px; border-radius: 4px; }
    </style>
</head>
<body>

    <h3>Quest 3 Standalone MIDI Bridge</h3>
    <div id="midi-status" class="status disconnected">MIDI: Disconnected</div>
    <div id="gamepad-status" class="status disconnected">Gamepad: Press X/Y To Wake</div>
    
    <div style="text-align:left; margin: 10px auto; width: 80%;">
        <span style="font-size: 12px; color: #888;">State Machine Logs:</span>
        <div id="log">System Booted... Ready to couple.</div>
    </div>

    <script>
        let midiAccess = null;
        let midiOutput = null;

        // --- CORE LOOPER STATE ENGINE ---
        let looperState = "EMPTY"; // EMPTY, RECORDING, PLAYING, STOPPED
        let looperVolume = 80.0;
        let lastSentVolume = -1;
        
        const MIDI_CHANNEL = 0xB0; // CC Control Change
        const CC_WAKE = 59;
        const CC_REC = 60;
        const CC_PLAY = 62;
        const CC_CLEAR = 64;
        const CC_VOL = 66;

        // Button Timing & Throttling Flags
        let buttonXPressed = false;
        let buttonYPressed = false;
        let yPressTime = null;
        let lastJoystickTime = 0;
        const JOYSTICK_THROTTLE = 100; // 10Hz pacing limit (ms)
        const VOLUME_RATE_SCALE = 2.0;  // Volume adjust scale per tick

        function uiLog(msg) {
            const logBox = document.getElementById('log');
            logBox.innerHTML += `<br>&gt; ${msg}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // --- WEB MIDI CONFIGURATION ---
        function initMIDI() {
            if (!navigator.requestMIDIAccess) {
                uiLog("CRITICAL: Web MIDI API not supported by this browser.");
                return;
            }
            navigator.requestMIDIAccess({ sysex: false }).then(access => {
                midiAccess = access;
                scanPorts();
                midiAccess.onstatechange = () => scanPorts();
            }).catch(e => uiLog("MIDI Access Rejected: " + e));
        }

        function scanPorts() {
            const outputs = midiAccess.outputs.values();
            let found = false;
            const statusEl = document.getElementById('midi-status');

            for (let output of outputs) {
                if (output.name.toLowerCase().includes("pocket") || output.name.toLowerCase().includes("master")) {
                    midiOutput = output;
                    found = true;
                    statusEl.innerText = `MIDI: Connected (${output.name})`;
                    statusEl.className = "status connected";
                    
                    // Hardware Initialization Payload (Wake command)
                    sendMIDI(CC_WAKE, 127);
                    break;
                }
            }
            if (!found) {
                midiOutput = null;
                statusEl.innerText = "MIDI: Pocket Master Offline";
                statusEl.className = "status disconnected";
            }
        }

        function sendMIDI(cc, value) {
            if (midiOutput) {
                midiOutput.send([MIDI_CHANNEL, cc, value]);
            }
        }

        // --- GAMEPAD POLLING ENGINE ---
        function pollGamepad() {
            const gamepads = navigator.getGamepads();
            let leftController = null;
            const gpStatus = document.getElementById('gamepad-status');

            for (let gp of gamepads) {
                if (gp && (gp.id.includes("Oculus") || gp.id.includes("Spatial") || gp.id.includes("Touch") || gp.id.includes("Gamepad"))) {
                    // Verifying Left Controller via description or checking standard mapping configurations
                    leftController = gp;
                    break;
                }
            }

            if (leftController) {
                gpStatus.innerText = "Gamepad: Focused & Stable";
                gpStatus.className = "status connected";

                const now = Date.now();

                // 1. THE X BUTTON (Index 4 on standard Quest Web mappings)
                if (leftController.buttons[4] && leftController.buttons[4].pressed) {
                    if (!buttonXPressed) {
                        buttonXPressed = true;
                        handleXPress();
                    }
                } else {
                    buttonXPressed = false;
                }

                // 2. THE Y BUTTON (Index 5 on standard Quest Web mappings)
                if (leftController.buttons[5] && leftController.buttons[5].pressed) {
                    if (!buttonYPressed) {
                        buttonYPressed = true;
                        yPressTime = now;
                    }
                } else {
                    if (buttonYPressed) {
                        buttonYPressed = false;
                        if (yPressTime) {
                            handleYRelease(now - yPressTime);
                            yPressTime = null;
                        }
                    }
                }

                // 3. THUMBSTICK VOLUME CONTROL (Axis index 1 is Left Stick Y)
                if (leftController.axes && leftController.axes[1] !== undefined) {
                    if (now - lastJoystickTime >= JOYSTICK_THROTTLE) {
                        let joyY = leftController.axes[1]; // Web Gamepad standard: UP is negative, DOWN is positive
                        
                        if (Math.abs(joyY) > 0.3) {
                            if (joyY < -0.3) {       // Pushing UP
                                looperVolume += VOLUME_RATE_SCALE;
                            } else if (joyY > 0.3) { // Pushing DOWN
                                looperVolume -= VOLUME_RATE_SCALE;
                            }

                            if (looperVolume > 100.0) looperVolume = 100.0;
                            if (looperVolume < 0.0) looperVolume = 0.0;

                            let intVol = Math.floor(looperVolume);
                            if (intVol !== lastSentVolume) {
                                sendMIDI(CC_VOL, intVol);
                                lastSentVolume = intVol;
                                uiLog(`[VOLUME] -> ${intVol}%`);
                            }
                            lastJoystickTime = now;
                        }
                    }
                }

            } else {
                gpStatus.innerText = "Gamepad: Link Idle (Tap Window/Press Button)";
                gpStatus.className = "status disconnected";
            }

            requestAnimationFrame(pollGamepad);
        }

        // --- STATE TRANSITION MAPPINGS ---
        function handleXPress() {
            sendMIDI(CC_WAKE, 127);
            
            if (looperState === "EMPTY" || looperState === "STOPPED") {
                sendMIDI(CC_REC, 127);
                looperState = "RECORDING";
                uiLog("X-Press ➔ RECORDING NEW LAYER (CC 60)");
            } 
            else if (looperState === "RECORDING") {
                sendMIDI(CC_PLAY, 127);
                looperState = "PLAYING";
                uiLog("X-Press ➔ CLOSED LOOP / PLAYING (CC 62)");
            } 
            else if (looperState === "PLAYING") {
                sendMIDI(CC_REC, 127);
                uiLog("X-Press ➔ OVERDUB MODE TOGGLED (CC 60)");
            }
        }

        function handleYRelease(durationMs) {
            sendMIDI(CC_WAKE, 127);
            
            if (durationMs >= 500) {
                // Long Hold -> Clear Matrix
                sendMIDI(CC_CLEAR, 127);
                looperState = "EMPTY";
                uiLog(`Y-Hold (${(durationMs/1000).toFixed(2)}s) ➔ MEMORY ERASE FLUSH (CC 64)`);
            } else {
                // Quick Tap -> Stop Playback
                sendMIDI(CC_PLAY, 0);
                looperState = "STOPPED";
                uiLog(`Y-Tap (${(durationMs/1000).toFixed(2)}s) ➔ STOP PRODUCTION (CC 62 Val 0)`);
            }
        }

        window.addEventListener("DOMContentLoaded", () => {
            initMIDI();
            requestAnimationFrame(pollGamepad);
        });
    </script>
</body>
</html>
