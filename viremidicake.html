<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebXR to BLE MIDI Bridge</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; padding: 2rem; }
        button { background: #304ffe; color: white; border: none; padding: 1rem 2rem; font-size: 1.2rem; border-radius: 4px; cursor: pointer; margin: 1rem; }
        button:disabled { background: #424242; color: #757575; cursor: not-allowed; }
        #log { margin-top: 2rem; padding: 1rem; background: #1e1e1e; border-radius: 4px; text-align: left; max-height: 250px; overflow-y: auto; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>WebXR ➔ BLE MIDI Bridge</h1>
    <p>Bypasses Horizon OS completely by tracking Touch controllers directly within a browser VR layer.</p>
    
    <button id="btn-ble" onclick="connectMIDI()">1. Connect Pocketmaster BLE</button>
    <button id="btn-xr" onclick="enterXR()" disabled>2. Enter Immersive VR</button>
    
    <div id="log">System Status: Idle. Awaiting hardware pairing...</div>

    <script>
        let midiCharacteristic = null;
        let xrSession = null;
        let prevXPressed = false;
        let prevYPressed = false;
        let looperVolume = 64; 
        let lastSentVolume = -1;
        let lastJoystickTime = 0;

        function log(msg) {
            const l = document.getElementById('log');
            l.innerText += `\n[${new Date().toLocaleTimeString()}] ${msg}`;
            l.scrollTop = l.scrollHeight;
        }

        // 1. Establish the Web Bluetooth MIDI connection while on the flat 2D page
        async function connectMIDI() {
            try {
                log("Opening native Bluetooth device picker...");
                // Standard Global Bluetooth MIDI Service UUID
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['03b80e5a-ede8-4b33-a751-6ce34ec4c700'] }]
                });
                
                log(`Connecting to GATT Server on: ${device.name}...`);
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('03b80e5a-ede8-4b33-a751-6ce34ec4c700');
                const characteristics = await service.getCharacteristics();
                
                midiCharacteristic = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);
                
                if (midiCharacteristic) {
                    log("SUCCESS: Pocketmaster coupled over BLE!");
                    document.getElementById('btn-xr').disabled = false;
                    document.getElementById('btn-ble').style.background = "#00c853";
                } else {
                    log("ERROR: Device connected, but no writable MIDI pipelines were exposed.");
                }
            } catch (err) {
                log("BLE Setup Error: " + err.message);
            }
        }

        // 2. Fire standard 5-byte BLE-MIDI wrapped packets
        function sendMidiCC(cc, value) {
            if (!midiCharacteristic) return;
            // Structure: [BLE Header, BLE Timestamp, MIDI Status (Ch1 CC), CC ID, Value]
            const packet = new Uint8Array([0x80, 0x80, 0xB0, cc, value]);
            midiCharacteristic.writeValueWithoutResponse(packet)
                .catch(e => console.error("BLE Write Failure:", e));
        }

        // 3. Request a standard immersive-vr window session
        async function enterXR() {
            if (!navigator.xr) {
                log("Critical Failure: Browser does not support WebXR framework hooks.");
                return;
            }
            try {
                xrSession = await navigator.xr.requestSession('immersive-vr', {
                    requiredFeatures: ['local-floor']
                });
                log("WebXR Immersive Session spawned successfully.");
                
                // WebXR demands an active WebGL layer context to step inside the headset
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl', { xrCompatible: true });
                xrSession.updateRenderState({ baseLayer: new XRWebGLLayer(xrSession, gl) });
                
                xrSession.addEventListener('end', () => {
                    log("Immersive layer collapsed. Session terminated.");
                    xrSession = null;
                });
                
                xrSession.requestAnimationFrame(onXRFrame);
            } catch (err) {
                log("Failed to spin up WebXR: " + err.message);
            }
        }

        // 4. The High-Speed Execution Frame Loop
        function onXRFrame(time, frame) {
            if (!xrSession) return;
            xrSession.requestAnimationFrame(onXRFrame);
            
            const inputSources = frame.session.inputSources;
            for (const input of inputSources) {
                // Focus strictly on your Left Quest Touch controller
                if (input.handedness === 'left' && input.gamepad) {
                    const gamepad = input.gamepad;
                    
                    // WebXR Standard Gamepad Mapping profiles for Left Touch:
                    // buttons[4] = Button X
                    // buttons[5] = Button Y
                    // axes[3]    = Thumbstick Y-Axis (UP is negative, DOWN is positive)
                    
                    const xButton = gamepad.buttons[4];
                    const yButton = gamepad.buttons[5];
                    const joyY = gamepad.axes[3];
                    
                    // --- Button X: Cycle Looper State (CC 60, Value 127) ---
                    if (xButton && xButton.pressed) {
                        if (!prevXPressed) {
                            sendMidiCC(60, 127);
                            prevXPressed = true;
                            log("Button X ➔ MIDI CC 60 [127]");
                        }
                    } else {
                        prevXPressed = false;
                    }
                    
                    // --- Button Y: Stop Looper State (CC 62, Value 0) ---
                    if (yButton && yButton.pressed) {
                        if (!prevYPressed) {
                            sendMidiCC(62, 0);
                            prevYPressed = true;
                            log("Button Y ➔ MIDI CC 62 [0]");
                        }
                    } else {
                        prevYPressed = false;
                    }
                    
                    // --- Thumbstick Y: Continuous Volume Engine (CC 66) ---
                    if (joyY !== undefined) {
                        const now = performance.now();
                        if (now - lastJoystickTime >= 40) { // 40ms polling throttle
                            
                            // Pushing UP yields a negative value -> Increase loop volume
                            if (joyY < -0.3) {
                                looperVolume += 2;
                            } 
                            // Pushing DOWN yields a positive value -> Decrease loop volume
                            else if (joyY > 0.3) {
                                looperVolume -= 2;
                            }
                            
                            // Clamp values to valid MIDI parameters
                            if (looperVolume > 127) looperVolume = 127;
                            if (looperVolume < 0) looperVolume = 0;
                            
                            const intVol = Math.floor(looperVolume);
                            if (intVol !== lastSentVolume && Math.abs(joyY) > 0.3) {
                                sendMidiCC(66, intVol);
                                lastSentVolume = intVol;
                                log(`Volume Stick ➔ MIDI CC 66 [${intVol}]`);
                            }
                            lastJoystickTime = now;
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
