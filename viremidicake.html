<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quest 3 Standalone MIDI Coupler</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #eee; padding: 20px; text-align: center; }
        .status { margin: 10px auto; padding: 10px; width: 80%; border-radius: 5px; font-weight: bold; }
        .connected { background: #1b4332; color: #75a47f; border: 1px solid #2d6a4f; }
        .disconnected { background: #4a1c1c; color: #e63946; border: 1px solid #660708; }
        button { background: #0284c7; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-bottom: 15px; width: 84%; }
        #log { background: #000; color: #00ff66; font-family: monospace; text-align: left; padding: 10px; height: 220px; overflow-y: auto; font-size: 12px; border-radius: 4px; }
    </style>
</head>
<body>

    <h3>Quest 3 Standalone MIDI Coupler</h3>
    
    <button id="connect-btn" onclick="requestBLEConnection()">CONNECT SONICAKE HARDWARE</button>
    
    <div id="ble-status" class="status disconnected">BLE Link: Offline</div>
    <div id="looper-status" class="status" style="background: #222; color: #aaa;">Looper State: EMPTY</div>
    
    <div style="text-align:left; margin: 10px auto; width: 80%;">
        <span style="font-size: 12px; color: #888;">Live Terminal Logs:</span>
        <div id="log">System Ready. Awaiting pairing gesture...</div>
    </div>

    <script>
        let bleDevice = null;
        let midiCharacteristic = null;

        // --- CORE LOOPER STATE ENGINE ---
        let looperState = "EMPTY"; // EMPTY, RECORDING, PLAYING, STOPPED
        let looperVolume = 80.0;   // Matches VR_Midi_Coupler.py initial line
        let lastSentVolume = -1;
        
        // Strict Hardware CC Mappings
        const MIDI_CHANNEL = 0xB0; 
        const CC_WAKE = 59;        // Looper Module Wake
        const CC_REC = 60;         // Record / Overdub
        const CC_PLAY = 62;        // Play / Stop
        const CC_CLEAR = 64;       // Flush Banks
        const CC_VOL = 66;         // Volume Fader Output

        // Standard BLE MIDI UUID Specifications
        const MIDI_SERVICE_UUID = "03b80e5a-ede8-4b33-a751-6ce34ec4c700";
        const MIDI_CHARACTERISTIC_UUID = "7772e5db-3868-4112-a1a9-f2669d106bf3";

        function uiLog(msg) {
            const logBox = document.getElementById('log');
            logBox.innerHTML += `<br>&gt; ${msg}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateUIState() {
            const statusEl = document.getElementById('looper-status');
            statusEl.innerText = `Looper State: ${looperState} | Volume: ${Math.floor(looperVolume)}%`;
        }

        // --- WEB BLUETOOTH CONNECTION ---
        async function requestBLEConnection() {
            const statusEl = document.getElementById('ble-status');
            try {
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [MIDI_SERVICE_UUID] }],
                    optionalServices: [MIDI_SERVICE_UUID]
                });

                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(MIDI_SERVICE_UUID);
                midiCharacteristic = await service.getCharacteristic(MIDI_CHARACTERISTIC_UUID);

                statusEl.innerText = `BLE Link: Connected (${bleDevice.name})`;
                statusEl.className = "status connected";
                uiLog("SUCCESS: Linked directly to Pocket Master BLE core.");
                
                bleDevice.addEventListener('gattserverdisconnected', () => {
                    statusEl.innerText = "BLE Link: Offline";
                    statusEl.className = "status disconnected";
                    midiCharacteristic = null;
                });

                // Run boot sequence initialization
                sendMIDI(CC_WAKE, 127);
                updateUIState();

            } catch (error) {
                uiLog(`Connection Aborted: ${error.message}`);
            }
        }

        function sendMIDI(cc, value) {
            if (!midiCharacteristic) return;
            try {
                // Wrap native MIDI message into the required 5-byte BLE MIDI packet framework
                const blePayload = new Uint8Array([0x80, 0x80, MIDI_CHANNEL, cc, value]);
                midiCharacteristic.writeValueWithoutResponse(blePayload);
            } catch (e) {
                uiLog(`Payload Drop: ${e.message}`);
            }
        }

        // --- KEYBOARD TRANSLATION MATRIX ---
        window.addEventListener('keydown', (event) => {
            // Protect configuration input boxes if present
            if (document.activeElement.tagName === 'INPUT') return;
            if (!midiCharacteristic) return;

            switch(event.key.toLowerCase()) {
                
                // 1. BUTTON X (Short Press) -> State Transition Loop
                case '1':
                    sendMIDI(CC_WAKE, 127);
                    if (looperState === "EMPTY" || looperState === "STOPPED") {
                        sendMIDI(CC_REC, 127);
                        looperState = "RECORDING";
                        uiLog("[LOOPER] X-Press ➔ RECORDING NEW LAYER (CC 60)");
                    } 
                    else if (looperState === "RECORDING") {
                        sendMIDI(CC_PLAY, 127);
                        looperState = "PLAYING";
                        uiLog("[LOOPER] X-Press ➔ CLOSED LOOP / PLAYING (CC 62)");
                    } 
                    else if (looperState === "PLAYING") {
                        sendMIDI(CC_REC, 127);
                        uiLog("[LOOPER] X-Press ➔ OVERDUBBING CURRENT LAYER (CC 60)");
                    }
                    updateUIState();
                    break;

                // 2. BUTTON Y (Short Press) -> Stop Playback
                case '2':
                    sendMIDI(CC_WAKE, 127);
                    sendMIDI(CC_PLAY, 0);
                    looperState = "STOPPED";
                    uiLog("[LOOPER] Y-Tap ➔ STOP LOOP PLAYBACK (CC 62 Val 0)");
                    updateUIState();
                    break;

                // 3. BUTTON Y (Long Press) -> Flush Memory Bank
                case '3':
                    sendMIDI(CC_WAKE, 127);
                    sendMIDI(CC_CLEAR, 127);
                    looperState = "EMPTY";
                    uiLog("[LOOPER] Y-Hold ➔ CLEAR MEMORY WIPE (CC 64)");
                    updateUIState();
                    break;

                // 4. THUMBSTICK UP -> Volume Pacing Up
                case 'u':
                    adjustVolume(2.0); // Step configuration rate matching VOLUME_RATE_SCALE
                    break;

                // 5. THUMBSTICK DOWN -> Volume Pacing Down
                case 'd':
                    adjustVolume(-2.0);
                    break;
            }
        });

        function adjustVolume(amount) {
            looperVolume += amount;
            if (looperVolume > 100.0) looperVolume = 100.0;
            if (looperVolume < 0.0) looperVolume = 0.0;

            let intVol = Math.floor(looperVolume);
            if (intVol !== lastSentVolume) {
                sendMIDI(CC_VOL, intVol);
                lastSentVolume = intVol;
                uiLog(`[VOLUME] ➔ ${intVol}%`);
                updateUIState();
            }
        }
    </script>
</body>
</html>
