<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest 3 Strudel HUD</title>
    
    <script src="index.min.js"></script>

    <style>
        body {
            margin: 0; background: #0b0b0e; color: #fff; font-family: monospace;
            display: flex; flex-direction: column; height: 100vh;
        }
        #hud-overlay {
            padding: 20px; background: rgba(20, 20, 25, 0.9);
            border-bottom: 2px solid #333; display: flex; gap: 15px;
        }
        button {
            background: #ff0055; border: none; color: white; padding: 12px 24px;
            font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px;
        }
        button:active { background: #cc0044; }
        #stop-btn { background: #333; }
        #console-log {
            flex: 1; padding: 20px; overflow-y: auto; color: #00ffcc; background: #000;
        }
    </style>
</head>
<body>

    <div id="hud-overlay">
        <button id="macro-1-btn">Macro: CYtrance Beat</button>
        <button id="macro-2-btn">Macro: Acid Bassline</button>
        <button id="stop-btn">Hush (Stop)</button>
    </div>

    <div id="console-log">
        <h3>System Ready. Engine loaded directly from pre-compiled source.</h3>
        <pre id="current-code">// No code running</pre>
    </div>

    <script>
        // 2. INITIALIZE THE GLOBAL STRUDEL CONTEXT
        // Loading the script tag above exposes 'initStrudel', 'evaluate', and 'hush' globally.
        initStrudel();

        const codeDisplay = document.getElementById('current-code');

        // Macro Executer
        function executeStrudelMacro(codeString) {
            try {
                evaluate(codeString);
                codeDisplay.textContent = codeString;
            } catch (err) {
                codeDisplay.textContent = `Error: ${err.message}`;
            }
        }

        // Wire up HUD Buttons directly to the engine
        document.getElementById('macro-1-btn').addEventListener('click', () => {
            executeStrudelMacro(`s("bd cp bd cp").slow(2)`);
        });

        document.getElementById('macro-2-btn').addEventListener('click', () => {
            executeStrudelMacro(`note("e2 g2 b2 d3").s("sawtooth").lpf(1200).fast(2)`);
        });

        document.getElementById('stop-btn').addEventListener('click', () => {
            hush();
            codeDisplay.textContent = "// Hushed";
        });
    </script>
</body>
</html>
