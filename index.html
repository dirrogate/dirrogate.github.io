<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strudel Standalone Studio Workspace</title>
    
    <script src="strudel-repl.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #0b0b0e; color: #fff; font-family: monospace;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* TOP PANE: Official Strudel Working REPL Workspace */
        #repl-container {
            flex: 1; display: flex; flex-direction: column;
            border-bottom: 3px solid #252530; overflow: hidden;
        }
        strudel-editor {
            width: 100%; height: 100%;
        }

        /* BOTTOM PANE: Custom VR Macro HUD Buttons */
        #hud-overlay {
            height: 80px; padding: 15px; background: #141419;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            box-sizing: border-box; z-index: 10;
        }
        button {
            background: #ff0055; border: none; color: white; padding: 12px 24px;
            font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 4px;
            font-family: inherit; transition: background 0.2s;
        }
        button:hover { background: #ff2b70; }
        button:active { background: #cc0044; }
        .stop-btn { background: #333344; }
        .stop-btn:hover { background: #444455; }
    </style>
</head>
<body>

    <div id="repl-container">
        <strudel-editor id="main-repl">
</strudel-editor>
    </div>

    <div id="hud-overlay">
        <button id="macro-1">Macro: CYtrance Beat</button>
        <button id="macro-2">Macro: Acid Bassline</button>
        <button id="macro-hush" class="stop-btn">Hush (Stop)</button>
    </div>

    <script>
        const replElement = document.getElementById('main-repl');

        // Cleanly injects new macro patterns into the interactive editor frame
        function injectMacroCode(patternCode) {
            const baseConfig = `// --- LOCAL SOUNDBANK CONFIGURATION ---\nsamples({\n  bd: ["bd/909.wav"],\n  cp: ["cp/clap.wav"]\n}, "http://localhost:8000/sounds/");\n\n// --- ACTIVE PERFORMANCE MACRO ---\n`;
            const fullCode = baseConfig + patternCode;
            
            if (replElement.editor) {
                // If the web component has initialized, use its native API to set and evaluate code
                if (typeof replElement.editor.setCode === 'function') {
                    replElement.editor.setCode(fullCode);
                }
                if (typeof replElement.editor.evaluate === 'function') {
                    replElement.editor.evaluate();
                }
            } else {
                // Fallback fallback if user clicks a button before DOM components upgrade completely
                replElement.setAttribute('code', fullCode);
            }
        }

        // WIRE UP HUD MACRO ACTIONS
        document.getElementById('macro-1').addEventListener('click', () => {
            injectMacroCode(`s("bd cp bd cp").slow(2).room(0.3)`);
        });

        document.getElementById('macro-2').addEventListener('click', () => {
            injectMacroCode(`note("e2 g2 b2 d3").s("sawtooth").lpf(1200).fast(2)`);
        });

        document.getElementById('macro-hush').addEventListener('click', () => {
            if (replElement.editor && typeof replElement.editor.stop === 'function') {
                replElement.editor.stop();
            } else {
                replElement.setAttribute('code', `// Hushed\nhush()`);
            }
        });
    </script>
</body>
</html>
