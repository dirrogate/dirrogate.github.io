<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strudel Spatial-Voice Live Engine</title>
    <script src="https://unpkg.com/@strudel/web"></script>
    <style>
        body { background-color: #08080c; color: #00ffcc; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        .wrapper { max-width: 900px; margin: 0 auto; }
        h1 { text-shadow: 0 0 8px #00ffcc; border-bottom: 2px solid #222; padding-bottom: 10px; }
        .panel { background: #11111a; border: 1px solid #222; border-radius: 8px; padding: 20px; margin-bottom: 15px; }
        button { background: #00ffcc; color: #08080c; border: none; padding: 14px 28px; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 15px; }
        button:hover { background: #fff; box-shadow: 0 0 12px #fff; }
        .btn-eval { background: #ff007f; color: #fff; width: 100%; margin-top: 10px; font-size: 16px; }
        .status-pill { font-weight: bold; padding: 4px 8px; border-radius: 4px; background: #222; color: #aaa; }
        .active { color: #00ff66; text-shadow: 0 0 5px #00ff66; background: #0b2b14; }
        .alert { color: #ff3366; text-shadow: 0 0 5px #ff3366; background: #3a0813; }
        textarea { 
            width: 100%; height: 220px; background: #040406; color: #fff; 
            border: 1px solid #ff007f; border-radius: 4px; padding: 15px; 
            font-family: 'Courier New', monospace; font-size: 16px; box-sizing: border-box;
        }
        .error-log { background: #2a0813; color: #ff3366; border-left: 4px solid #ff3366; padding: 10px; font-size: 14px; margin-top: 10px; }
        .console-msg { color: #aaa; font-style: italic; margin-top: 5px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Strudel Spatial-Voice Console</h1>
    
    <div class="panel">
        <button id="bootEngineBtn">⚡ BOOT AUDIO & VOICE ENGINE</button>
        <p style="margin-top: 15px;">
            Audio Status: <span id="audioStatus" class="status-pill">OFFLINE</span> | 
            Mic Status: <span id="micStatus" class="status-pill">STANDBY</span>
        </p>
        <p id="voiceTranscript" class="console-msg">System Log: Waiting for user activation...</p>
    </div>

    <div class="panel">
        <h3>Live Script Editor</h3>
        <textarea id="codeEditor">s("bd sd").play()</textarea>
        <button id="executeBtn" class="btn-eval">▶ RUN CODE (Ctrl + Enter)</button>
        
        <div id="errorConsole" class="error-log" style="display: none;"></div>
    </div>
</div>

<script>
    // Initialize Strudel immediately on page load
    try {
        initStrudel({ prebake: () => samples('github:tidalcycles/dirt-samples') });
    } catch (e) {
        showError("Pre-boot warning: " + e.message);
    }

    let isEngineRunning = false;
    let speechEngine;
    const errorConsole = document.getElementById('errorConsole');

    function showError(msg) {
        if (msg) {
            errorConsole.innerText = `System Notification: ${msg}`;
            errorConsole.style.display = 'block';
        } else {
            errorConsole.style.display = 'none';
        }
    }

    // Main Ignition Trigger
    document.getElementById('bootEngineBtn').addEventListener('click', () => {
        if (isEngineRunning) return;
        showError(null);
        
        try {
            // Force Audio Status to active immediately
            const audioPill = document.getElementById('audioStatus');
            audioPill.innerText = "ONLINE";
            audioPill.className = "status-pill active";
            
            // Instantly notify user to look for browser mic permission prompt
            const micPill = document.getElementById('micStatus');
            micPill.innerText = "🔴 check browser permission popup";
            micPill.className = "status-pill alert";
            
            document.getElementById('voiceTranscript').innerText = "System Log: Requesting microphone hardware link...";
            
            // Boot the speech recognition loop
            bootVoiceRecognition();
            isEngineRunning = true;
            
            // Fire current text code block to unlock the audio stream
            runActiveCode();
        } catch (err) {
            showError(`Ignition failed: ${err.message}`);
        }
    });

    // Pure Manual Evaluation Routine
    function runActiveCode() {
        showError(null);
        const rawInputCode = document.getElementById('codeEditor').value;
        try {
            if (typeof evaluate === 'function') {
                evaluate(rawInputCode);
            } else if (typeof window.evaluate === 'function') {
                window.evaluate(rawInputCode);
            } else {
                showError("Strudel engine is still registering syntax variables. Wait 2 seconds and try again.");
            }
        } catch (err) {
            showError(`Execution Error: ${err.message}`);
        }
    }

    document.getElementById('executeBtn').addEventListener('click', runActiveCode);

    document.getElementById('codeEditor').addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            runActiveCode();
        }
    });

    // Voice Processing Core
    function bootVoiceRecognition() {
        const SpeechLibrary = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechLibrary) {
            showError("Web Speech API is completely disabled or unsupported on this specific browser version.");
            return;
        }

        speechEngine = new SpeechLibrary();
        speechEngine.continuous = true;
        speechEngine.interimResults = false;
        speechEngine.lang = 'en-US';

        speechEngine.onstart = () => {
            const micPill = document.getElementById('micStatus');
            micPill.innerText = "LISTENING (MIC ACTIVE)";
            micPill.className = "status-pill active";
            document.getElementById('voiceTranscript').innerText = "System Log: Mic connected. Ready for commands ('techno beat', 'add acid', 'stop').";
        };

        speechEngine.onerror = (event) => {
            showError(`Microphone Error Code: ${event.error}`);
            if (event.error === 'not-allowed') {
                document.getElementById('micStatus').innerText = "BLOCKED BY BROWSER";
                document.getElementById('micStatus').className = "status-pill alert";
            }
        };

        speechEngine.onend = () => {
            // Restart system if browser attempts a sleep cycle drop
            if (isEngineRunning) {
                try { speechEngine.start(); } catch(e) {}
            }
        };

        speechEngine.onresult = (event) => {
            const speechString = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
            document.getElementById('voiceTranscript').innerText = `Heard phrase: "${speechString}"`;
            interpretVoiceMacros(speechString);
        };

        speechEngine.start();
    }

    // Macro Parser Matcher
    function interpretVoiceMacros(phrase) {
        const editor = document.getElementById('codeEditor');
        let processed = false;

        if (phrase.includes('techno beat') || phrase.includes('floor') || phrase.includes('beat')) {
            let tempo = 125;
            let grabBpm = phrase.match(/(\d+)\s*bpm/);
            if (grabBpm) { tempo = parseInt(grabBpm[1]); }
            
            editor.value = `setcps(${tempo}/60/4);\n\nstack(\n  s("bd*4, [~ oh]*4")\n).play()`;
            processed = true;
        }

        if (phrase.includes('run an acid') || phrase.includes('add acid') || phrase.includes('acid bassline')) {
            editor.value = `setcps(125/60/4);\n\nstack(\n  s("bd*4, [~ oh]*4"),\n  note("<c2 c3 eb2 bb2>*2").s("sawtooth").lpf(900).lpq(5)\n).play()`;
            processed = true;
        }

        if (phrase.includes('remove') || phrase.includes('stop') || phrase.includes('hush') || phrase.includes('clear')) {
            editor.value = `hush()`;
            processed = true;
        }

        if (processed) {
            runActiveCode();
        }
    }
</script>

</body>
</html>
