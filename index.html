<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strudel Voice + Manual Hybrid Terminal</title>
    <script src="https://unpkg.com/@strudel/web@1.0.3"></script>
    <style>
        body { background-color: #0c0c12; color: #00ffcc; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; }
        h1 { text-shadow: 0 0 10px #00ffcc; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .panel { background: #13131f; border: 1px solid #2a2a40; border-radius: 6px; padding: 20px; }
        button { background: #00ffcc; color: #0c0c12; border: none; padding: 12px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 14px; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        .btn-run { background: #ff007f; color: white; margin-top: 10px; width: 100%; font-size: 16px; }
        .status { font-weight: bold; color: #ff3366; }
        .listening { color: #00ff66; text-shadow: 0 0 5px #00ff66; }
        textarea { 
            width: 100%; height: 250px; background: #07070a; color: #fff; 
            border: 1px solid #ff007f; border-radius: 4px; padding: 15px; 
            font-family: 'Courier New', monospace; font-size: 16px; box-sizing: border-box; resize: vertical;
        }
        .log { color: #888; font-style: italic; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Strudel Voice + Manual Hybrid Terminal</h1>
    
    <div class="grid">
        <!-- System Control Panel -->
        <div class="panel">
            <button id="startBtn">⚡ START VOICE ENGINE</button>
            <p>System State: <span id="micStatus" class="status">OFFLINE</span></p>
            <p id="transcript" class="log">Heard: Waiting for audio initialization...</p>
        </div>

        <!-- Live Code REPL Field -->
        <div class="panel">
            <h3>Interactive Live-Code Stream</h3>
            <p class="log">// Edit manually with VR keyboard or use voice commands to auto-generate:</p>
            <textarea id="codeConsole">hush()</textarea>
            <button id="runManualBtn" class="btn-run">▶ EVALUATE / UPDATE AUDIO (Ctrl+Enter)</button>
        </div>
    </div>
</div>

<script>
    let state = { bpm: 125, drums: '', bass: '' };
    let isEngineActive = false;
    let recognition;

    // Load sample assets
    initStrudel({ prebake: () => samples('github:tidalcycles/dirt-samples') });

    // Handle Manual Runtime Evaluation
    const codeConsole = document.getElementById('codeConsole');
    const runManualBtn = document.getElementById('runManualBtn');

    function executeCurrentConsoleCode() {
        const structuralCode = codeConsole.value;
        evaluate(structuralCode);
    }

    runManualBtn.addEventListener('click', executeCurrentConsoleCode);
    
    // Support keyboard shortcut (Ctrl + Enter) inside virtual keyboard environments
    codeConsole.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            executeCurrentConsoleCode();
        }
    });

    // Handle Voice Engine Initialization
    document.getElementById('startBtn').addEventListener('click', () => {
        if (isEngineActive) return;
        hush();
        isEngineActive = true;
        document.getElementById('micStatus').innerText = "LISTENING (ACTIVE)";
        document.getElementById('micStatus').className = "status listening";
        initVoiceRecognition();
    });

    function initVoiceRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Web Speech API not supported by this browser interface.");
            return;
        }

        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            const speechResult = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
            document.getElementById('transcript').innerText = `Heard: "${speechResult}"`;
            processCommand(speechResult);
        };

        recognition.onend = () => { if (isEngineActive) recognition.start(); };
        recognition.start();
    }

    // Command Processor
    function processCommand(text) {
        let stateChanged = false;

        if (text.includes('techno beat') || text.includes('floor') || text.includes('beat')) {
            let bpmMatch = text.match(/(\d+)\s*bpm/);
            if (bpmMatch) { state.bpm = parseInt(bpmMatch[1]); }
            state.drums = `s("bd*4, [~ oh]*4")`;
            stateChanged = true;
        }

        if (text.includes('run an acid') || text.includes('add acid') || text.includes('acid bassline')) {
            state.bass = `note("<c2 c3 eb2 bb2>*2").s("sawtooth").lpf(900).lpq(5)`;
            stateChanged = true;
        }

        if (text.includes('remove') && text.includes('acid')) {
            state.bass = '';
            stateChanged = true;
        }

        if (text.includes('stop') || text.includes('hush') || text.includes('clear everything')) {
            state.drums = '';
            state.bass = '';
            stateChanged = true;
        }

        if (stateChanged) {
            compileToConsole();
        }
    }

    // Merges structural blocks back into the text panel and triggers compiler
    function compileToConsole() {
        let code = `setcps(${state.bpm}/60/4);\n\n`;
        let layers = [];

        if (state.drums) layers.push(`  ${state.drums}`);
        if (state.bass) layers.push(`  ${state.bass}`);

        if (layers.length > 0) {
            code += `stack(\n${layers.join(',\n')}\n).gain(0.8);`;
        } else {
            code = `hush();`;
        }

        // Push code string directly into the text element so user can see/edit it
        codeConsole.value = code;
        evaluate(code);
    }
</script>

</body>
</html>
