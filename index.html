<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strudel VR Spatial-Voice Console</title>
    <script src="https://unpkg.com/@strudel/web"></script>
    <style>
        body { background-color: #08080c; color: #00ffcc; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        .wrapper { max-width: 900px; margin: 0 auto; }
        h1 { text-shadow: 0 0 8px #00ffcc; border-bottom: 2px solid #222; padding-bottom: 10px; font-size: 22px; }
        .panel { background: #11111a; border: 1px solid #222; border-radius: 8px; padding: 20px; margin-bottom: 15px; }
        
        /* VR Target Input Bar */
        .vr-voice-bar {
            width: 100%; padding: 16px; background: #1a1a26; color: #fff;
            border: 2px solid #00ffcc; border-radius: 6px; font-size: 16px;
            font-family: 'Courier New', monospace; box-sizing: border-box;
            margin-bottom: 10px; text-shadow: 0 0 5px #fff;
        }
        .vr-voice-bar:focus { border-color: #ff007f; outline: none; box-shadow: 0 0 10px #ff007f; }
        
        .btn-eval { background: #ff007f; color: #fff; border: none; padding: 14px 28px; font-weight: bold; cursor: pointer; border-radius: 4px; width: 100%; margin-top: 10px; font-size: 16px; }
        .status-pill { font-weight: bold; padding: 4px 8px; border-radius: 4px; background: #222; color: #aaa; }
        .active { color: #00ff66; text-shadow: 0 0 5px #00ff66; background: #0b2b14; }
        
        textarea { 
            width: 100%; height: 240px; background: #040406; color: #fff; 
            border: 1px solid #222; border-radius: 4px; padding: 15px; 
            font-family: 'Courier New', monospace; font-size: 16px; box-sizing: border-box; line-height: 1.5;
        }
        .error-log { background: #2a0813; color: #ff3366; border-left: 4px solid #ff3366; padding: 12px; font-size: 14px; margin-top: 10px; }
        .hint-text { color: #888; font-size: 13px; margin: 5px 0 0 0; font-style: italic; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Strudel VR Spatial Console</h1>
    
    <div class="panel">
        <h3>🎙️ OS Voice Input Channel</h3>
        <input type="text" id="vrVoiceInput" class="vr-voice-bar" placeholder="Tap here -> trigger Quest Keyboard Mic -> Speak...">
        <p class="hint-text">Try speaking multiple commands: "Techno beat. Add acid. Stop."</p>
        <p style="margin-top: 15px; font-size: 13px; margin-bottom: 0;">
            Audio Engine: <span id="audioStatus" class="status-pill">OFFLINE (TAP TO ACTIVATE)</span>
        </p>
    </div>

    <div class="panel">
        <h3>Live Workspace Matrix</h3>
        <textarea id="codeEditor">s("bd sd").play()</textarea>
        <button id="executeBtn" class="btn-eval">▶ RUN WORKSPACE CODE</button>
        
        <div id="errorConsole" class="error-log" style="display: none;"></div>
    </div>
</div>

<script>
    const errorConsole = document.getElementById('errorConsole');
    const vrVoiceInput = document.getElementById('vrVoiceInput');
    const editor = document.getElementById('codeEditor');

    function showError(msg) {
        if (msg) {
            errorConsole.innerText = `[System Alert] ${msg}`;
            errorConsole.style.display = 'block';
        } else {
            errorConsole.style.display = 'none';
        }
    }

    // Initialize Strudel Lexicon Context
    try {
        initStrudel({ prebake: () => samples('github:tidalcycles/dirt-samples') });
    } catch (e) {
        showError("Initialization Warning: " + e.message);
    }

    let isAudioUnlocked = false;

    // Wake engine up on first manual interaction
    function unlockAudioEngine() {
        if (!isAudioUnlocked) {
            const audioPill = document.getElementById('audioStatus');
            audioPill.innerText = "ONLINE";
            audioPill.className = "status-pill active";
            isAudioUnlocked = true;
            runActiveCode();
        }
    }

    document.getElementById('executeBtn').addEventListener('click', () => {
        unlockAudioEngine();
        runActiveCode();
    });

    // INTERCEPT QUEST KEYBOARD DICTATION STREAM
    vrVoiceInput.addEventListener('input', (event) => {
        unlockAudioEngine();
        const rawText = event.target.value;
        
        // Process strings if a sentence structure or complete phrase is detected
        if (rawText.trim().length > 2) {
            parseAndLineBreak(rawText);
        }
    });

    // Clear input bar when user selects it to make room for a clean command run
    vrVoiceInput.addEventListener('focus', () => {
        vrVoiceInput.value = "";
    });

    function parseAndLineBreak(text) {
        // Normalize text to lowercase and split by standard punctuation pauses (. , ? !)
        const spokenPhrases = text.toLowerCase().split(/[.,?!]+/);
        let dynamicCodeLines = [];
        let executedMacro = false;

        spokenPhrases.forEach(phrase => {
            let cleanedPhrase = phrase.trim();
            if (!cleanedPhrase) return;

            // Macro Mapping to Strudel Syntactical Blocks
            if (cleanedPhrase.includes('techno beat') || cleanedPhrase.includes('floor') || cleanedPhrase.includes('beat')) {
                dynamicCodeLines.push('setcps(125/60/4);');
                dynamicCodeLines.push('stack(\n  s("bd*4, [~ oh]*4")\n).play();');
                executedMacro = true;
            }
            else if (cleanedPhrase.includes('acid')) {
                // If a beat hasn't been established yet, append it cleanly
                if (dynamicCodeLines.length === 0) {
                    dynamicCodeLines.push('setcps(125/60/4);');
                    dynamicCodeLines.push('stack(\n  s("bd*4, [~ oh]*4"),');
                } else {
                    // Strip down prior closures if chaining sequences together live
                    let lastIdx = dynamicCodeLines.length - 1;
                    if (dynamicCodeLines[lastIdx].includes('.play();')) {
                        dynamicCodeLines[lastIdx] = dynamicCodeLines[lastIdx].replace(').play();', ',');
                    }
                }
                dynamicCodeLines.push('  note("<c2 c3 eb2 bb2>*2").s("sawtooth").lpf(900).lpq(5)\n).play();');
                executedMacro = true;
            }
            else if (cleanedPhrase.includes('stop') || cleanedPhrase.includes('hush') || cleanedPhrase.includes('clear')) {
                dynamicCodeLines.push('hush();');
                executedMacro = true;
            }
            else {
                // FALLBACK: If you dictate normal phrases, split them line by line inside comments
                dynamicCodeLines.push(`// Spoken Command: ${cleanedPhrase}`);
            }
        });

        if (dynamicCodeLines.length > 0) {
            // Join parsed expressions using explicit clean carriage returns
            editor.value = dynamicCodeLines.join('\n\n');
            
            // Instantly execute the fresh layout if an active macro command was invoked
            if (executedMacro) {
                runActiveCode();
            }
        }
    }

    function runActiveCode() {
        showError(null);
        try {
            if (typeof evaluate === 'function') {
                evaluate(editor.value);
            } else if (typeof window.evaluate === 'function') {
                window.evaluate(editor.value);
            }
        } catch (err) {
            showError(`Execution Runtime Error: ${err.message}`);
        }
    }
</script>

</body>
</html>
