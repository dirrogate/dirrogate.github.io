<!DOCTYPE html>
<html lang="en">
<head>
    <title>VR MIDI Control v3</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        button { font-size: 24px; padding: 30px; border-radius: 15px; border: none; cursor: pointer; color: #000; font-weight: bold; }
        #btn-connect { background: #ff9800; grid-column: span 2; }
        #btn-cycle { background: #00ff88; }
        #btn-stop { background: #ff3366; }
        .volume-container { grid-column: span 2; text-align: center; margin-top: 20px; }
        input[type=range] { width: 100%; height: 50px; cursor: pointer; }
        #log { margin-top: 20px; color: #0f0; font-family: monospace; }
    </style>
</head>
<body>

    <button id="btn-connect" onclick="initMidi()">CONNECT & ENABLE MIDI</button>

    <div class="grid">
        <button id="btn-cycle" onclick="toggleRecord()">CYCLE / DUB</button>
        <button id="btn-stop" 
                onmousedown="startStopTimer()" 
                onmouseup="clearStopTimer()" 
                onmouseleave="clearStopTimer()">STOP / HOLD TO CLEAR</button>
        
        <div class="volume-container">
            <label>VOLUME (CC 66)</label>
            <input type="range" min="0" max="127" value="64" oninput="sendVolume(this.value)">
        </div>
    </div>

    <div id="log">Status: Awaiting Connection...</div>

    <script>
        let midiOutput = null;
        let isRecording = false;
        let stopTimer = null;

        function log(msg) { document.getElementById('log').innerText = msg; }

        async function initMidi() {
            try {
                const access = await navigator.requestMIDIAccess();
                let found = false;
                for (let output of access.outputs.values()) {
                    if (output.name.toLowerCase().includes("pocket") || output.name.toLowerCase().includes("master")) {
                        midiOutput = output;
                        found = true;
                        break;
                    }
                }

                if (found) {
                    log("Connected to: " + midiOutput.name);
                    document.getElementById('btn-connect').style.background = "#00ff88";
                    document.getElementById('btn-connect').innerText = "MIDI ACTIVE";
                } else {
                    log("Error: MIDI found, but no matching device name.");
                }
            } catch (err) {
                log("CRITICAL ERROR: " + err.message);
            }
        }

        function sendMidi(cc, val) {
            if (midiOutput) {
                midiOutput.send([0xB0, cc, val]);
            } else {
                log("Error: Click CONNECT first.");
            }
        }

        // Logic
        function toggleRecord() {
            isRecording = !isRecording;
            sendMidi(60, isRecording ? 127 : 0);
            log("Record State: " + (isRecording ? "RECORDING" : "PLAYING"));
        }

        function startStopTimer() {
            stopTimer = setTimeout(() => {
                sendMidi(64, 127);
                log("COMMAND: CLEAR");
                stopTimer = null;
            }, 1000);
        }

        function clearStopTimer() {
            if (stopTimer) {
                clearTimeout(stopTimer);
                stopTimer = null;
                sendMidi(62, 0);
                log("COMMAND: STOP");
            }
        }

        function sendVolume(val) {
            sendMidi(66, parseInt(val));
            log("Volume: " + val);
        }
    </script>
</body>
</html>
