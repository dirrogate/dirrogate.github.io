<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR MIDI Dashboard v2.0</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --panel: #161821;
            --accent-green: #00ff88;
            --accent-red: #ff3366;
            --accent-blue: #00e5ff;
            --text: #e0e0e0;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; box-sizing: border-box; user-select: none;
        }

        .header {
            width: 100%; max-width: 800px; display: flex; justify-content: space-between;
            margin-bottom: 20px; padding: 15px; background: var(--panel);
            border-radius: 12px; border: 1px solid #2a2d3a;
        }

        #btn-connect {
            background: var(--accent-blue); color: #000; border: none;
            padding: 15px 30px; font-size: 1.2rem; font-weight: 900;
            border-radius: 8px; cursor: pointer;
        }

        .dashboard { display: flex; gap: 20px; width: 100%; max-width: 800px; flex: 1; }
        .pad-container { flex: 2; display: flex; flex-direction: column; gap: 20px; }
        
        .drum-pad {
            flex: 1; border: none; border-radius: 16px; font-size: 2.5rem;
            font-weight: 900; color: #000; cursor: pointer;
            transition: transform 0.05s ease, filter 0.1s ease;
        }

        .drum-pad:active { transform: scale(0.95); filter: brightness(1.3); }

        #pad-play { background: linear-gradient(135deg, #00ff88, #00b35f); }
        #pad-play.recording { background: #ffcc00; }
        
        #pad-stop { background: linear-gradient(135deg, #ff3366, #cc0033); }

        .fader-container {
            flex: 1; background: var(--panel); border-radius: 16px;
            border: 1px solid #2a2d3a; display: flex; flex-direction: column;
            align-items: center; padding: 20px;
        }

        input[type=range] {
            -webkit-appearance: none; width: 300px; background: transparent;
            transform: rotate(-90deg) translate(-100px, 0); transform-origin: left top;
            margin-top: 150px; cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 60px; width: 90px;
            border-radius: 10px; background: var(--accent-blue);
        }
    </style>
</head>
<body>

    <div class="header">
        <button id="btn-connect" onclick="initMidi()">Re-Scan USB Hardware</button>
        <div id="status-text">DISCONNECTED</div>
    </div>

    <div class="dashboard">
        <div class="pad-container">
            <button id="pad-play" class="drum-pad" onclick="toggleRecord()">CYCLE / DUB</button>
            <button id="pad-stop" class="drum-pad" 
                onmousedown="startStopTimer()" onmouseup="clearStopTimer(event)" 
                onmouseleave="clearStopTimer(event)">STOP / CLEAR</button>
        </div>

        <div class="fader-container">
            <input type="range" id="vol-slider" min="0" max="127" value="64" oninput="updateVolume(this.value)">
        </div>
    </div>

    <script>
        let midiOutput = null;
        let isRecording = false;
        let stopPressTimer = null;

        async function initMidi() {
            try {
                const access = await navigator.requestMIDIAccess();
                let found = false;
                for (let output of access.outputs.values()) {
                    if (output.name.toLowerCase().includes("pocket") || output.name.toLowerCase().includes("master")) {
                        midiOutput = output;
                        found = true;
                        break;
                    }
                }
                if (found) {
                    document.getElementById('status-text').innerText = "LINKED: " + midiOutput.name;
                } else {
                    alert("Pocketmaster not found. Check USB connection.");
                }
            } catch (err) { alert("MIDI Access Denied"); }
        }

        function fireCC(cc, val) {
            if (midiOutput) midiOutput.send([0xB0, cc, val]);
        }

        // REQUIREMENT 1: Toggle logic
        function toggleRecord() {
            isRecording = !isRecording;
            const btn = document.getElementById('pad-play');
            if (isRecording) {
                fireCC(60, 127);
                btn.classList.add('recording');
            } else {
                fireCC(60, 0); // Or 127 depending on your specific toggle hardware
                btn.classList.remove('recording');
            }
        }

        // REQUIREMENT 2: Stop vs Clear (Long Press) logic
        function startStopTimer() {
            stopPressTimer = setTimeout(() => {
                fireCC(64, 127); // CC 64 = Clear Command
                console.log("Clear command sent");
                stopPressTimer = null; // Prevent the click from firing on release
            }, 1000); // 1 second hold
        }

        function clearStopTimer(e) {
            if (stopPressTimer) {
                clearTimeout(stopPressTimer);
                fireCC(62, 0); // CC 62 = Stop Command
                stopPressTimer = null;
            }
        }

        function updateVolume(val) {
            fireCC(66, parseInt(val));
        }
    </script>
</body>
</html>
