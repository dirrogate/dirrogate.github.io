<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strudel Standalone Studio Workspace</title>
    
    <script src="strudel-repl.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #0b0b0e; color: #fff; font-family: monospace;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* TOP PANE: Main working REPL workspace */
        #repl-container {
            flex: 1; display: flex; flex-direction: column;
            border-bottom: 3px solid #252530; overflow: hidden;
        }
        strudel-editor {
            width: 100%; height: 100%;
        }

        /* BOTTOM PANE: Macro Controller HUD */
        #hud-overlay {
            height: 80px; padding: 15px; background: #141419;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            box-sizing: border-box; z-index: 10;
        }
        button {
            background: #ff0055; border: none; color: white; padding: 12px 24px;
            font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 4px;
            font-family: inherit; transition: background 0.2s;
        }
        button:hover { background: #ff2b70; }
        button:active { background: #cc0044; }
        
        /* Context Specific UI Stylings */
        .synth-btn { background: #00ffcc; color: #000; }
        .synth-btn:hover { background: #33ffdd; }
        .stop-btn { background: #333344; }
        .stop-btn:hover { background: #444455; }
    </style>
</head>
<body>

    <div id="repl-container">
        <strudel-editor id="main-repl">
</strudel-editor>
    </div>

    <div id="hud-overlay">
        <button id="macro-1">Macro: Local Drums</button>
        <button id="macro-2" class="synth-btn">Macro: Acid Bassline (Internal Synth)</button>
        <button id="macro-hush" class="stop-btn">Hush (Stop)</button>
    </div>

    <script>
        const replElement = document.getElementById('main-repl');

        // Cleanly injects code directly into the editor interface
        function injectMacroCode(patternCode) {
            if (replElement.editor) {
                if (typeof replElement.editor.setCode === 'function') {
                    replElement.editor.setCode(patternCode);
                }
                if (typeof replElement.editor.evaluate === 'function') {
                    replElement.editor.evaluate();
                }
            } else {
                // Initial load fallback layer
                replElement.setAttribute('code', patternCode);
            }
        }

        // --- WIRE UP HUD MACRO ACTIONS ---

        // Macro 1: Drums (Will remain silent on GitHub Pages until hosted locally on port 8000)
        document.getElementById('macro-1').addEventListener('click', () => {
            const drumPattern = `// Maps local files safely without crashing the internal synth paths\nsamples({\n  bd: ["bd/909.wav"],\n  cp: ["cp/clap.wav"]\n}, "http://localhost:8000/sounds/");\n\ns("bd cp bd cp").slow(2).room(0.2)`;
            injectMacroCode(drumPattern);
        });

        // Macro 2: Pure Internal Synth Waveforms (Works immediately anywhere, zero network footprint)
        document.getElementById('macro-2').addEventListener('click', () => {
            const synthPattern = `// Running pure browser oscillators\nnote("e2 g2 b2 d3").s("sawtooth").lpf(1200).fast(2)`;
            injectMacroCode(synthPattern);
        });

        // Global Stop Control
        document.getElementById('macro-hush').addEventListener('click', () => {
            if (replElement.editor && typeof replElement.editor.stop === 'function') {
                replElement.editor.stop();
            } else {
                injectMacroCode(`// Hushed\nhush()`);
            }
        });
    </script>
</body>
</html>
