<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strudel Offline Master Studio</title>
    <script src="strudel-repl.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #0b0b0e; color: #fff; font-family: monospace;
            display: flex; flex-direction: column; overflow: hidden;
        }
        #repl-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        strudel-repl { width: 100%; height: 100%; }

        /* MULTI-FUNCTIONAL CONTROL HUD */
        #hud-overlay {
            height: auto; min-height: 80px; padding: 15px; background: #141419;
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 12px;
            box-sizing: border-box; border-top: 3px solid #252530; z-index: 10;
        }
        button {
            background: #ff0055; border: none; color: white; padding: 10px 18px;
            font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 4px;
            font-family: inherit; transition: background 0.1s;
        }
        button:hover { background: #ff2b70; }
        
        /* Menu Action Theme Colors */
        .utility-btn { background: #3a3a4a; color: #fff; }
        .utility-btn:hover { background: #4a4a5a; }
        .save-btn { background: #00ffcc; color: #000; }
        .save-btn:hover { background: #33ffdd; }
        .stop-btn { background: #ff3333; }
    </style>
</head>
<body>

    <div id="repl-container">
        <strudel-repl id="main-repl">
</strudel-repl>
    </div>

    <div id="hud-overlay">
        <button id="macro-1" class="utility-btn">CYtrance Base</button>
        
        <button id="btn-save" class="save-btn">💾 Save Session (Local)</button>
        <button id="btn-load" class="utility-btn">📂 Load Last Save</button>
        <button id="btn-export" class="utility-btn">📥 Export .JS File</button>
        
        <button id="btn-help" class="utility-btn">❓ Syntax Cheat-Sheet</button>
        <button id="macro-hush" class="stop-btn">Hush (Stop)</button>
    </div>

    <script>
        const replElement = document.getElementById('main-repl');

        function getEditorCode() {
            if (replElement.editor && typeof replElement.editor.getCode === 'function') {
                return replElement.editor.getCode();
            }
            return "";
        }

        function setEditorCode(code) {
            if (replElement.editor && typeof replElement.editor.setCode === 'function') {
                replElement.editor.setCode(code);
                replElement.editor.evaluate();
            }
        }

        // 1. SAVE WORKSPACE TO BROWSER STORAGE
        document.getElementById('btn-save').addEventListener('click', () => {
            const currentCode = getEditorCode();
            if (currentCode) {
                localStorage.setItem('strudel_offline_save', currentCode);
                alert('Session saved safely to browser memory.');
            }
        });

        // 2. LOAD WORKSPACE FROM BROWSER STORAGE
        document.getElementById('btn-load').addEventListener('click', () => {
            const savedCode = localStorage.getItem('strudel_offline_save');
            if (savedCode) {
                setEditorCode(savedCode);
            } else {
                alert('No saved sequence found.');
            }
        });

        // 3. EXPORT SOURCE AS HARD FILE FOR HEADSET/GITHUB IMPORTING
        document.getElementById('btn-export').addEventListener('click', () => {
            const currentCode = getEditorCode();
            const blob = new Blob([currentCode], { type: 'text/javascript' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'cyberhouse-pattern.js';
            a.click();
        });

        // 4. QUICK HELP SYNTAX HOOK
        document.getElementById('btn-help').addEventListener('click', () => {
            alert(`Strudel Live Coding Cheat-Sheet:\n\n` +
                  `• Synthesizers: .s("sawtooth") | .s("triangle") | .s("square")\n` +
                  `• Timing Modifiers: .fast(2) | .slow(2) | .striate(4)\n` +
                  `• Filters & FX: .lpf(1200) | .hpfl(400) | .room(0.4) | .delay(0.5)\n` +
                  `• Layouts: .pianoroll() | .grid()`);
        });

        // Core Functions
        document.getElementById('macro-1').addEventListener('click', () => {
            setEditorCode(`note("e2 g2 b2 d3").s("sawtooth").lpf(1200).fast(2).pianoroll()`);
        });

        document.getElementById('macro-hush').addEventListener('click', () => {
            if (replElement.editor && typeof replElement.editor.stop === 'function') {
                replElement.editor.stop();
            }
        });
    </script>
</body>
</html>
